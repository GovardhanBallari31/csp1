<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link
rel="stylesheet"
href="register.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>Create Account</h1>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">

<option value="USER">
User
</option>

<option value="ADMIN">
Admin
</option>

</select>

<button
onclick="registerUser()">

Register

</button>

<p>

Already Registered?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

<script src="register.js"></script>

</body>
</html>
